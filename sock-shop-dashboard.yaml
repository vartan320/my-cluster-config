apiVersion: v1
kind: ConfigMap
metadata:
  name: sock-shop-dashboard
  namespace: monitoring
  labels:
    # This label tells the "Sidecar" we enabled above to grab this file
    grafana_dashboard: "1"
annotations:
  # This is the ID for the Sock Shop dashboard we discussed
  k8s-sidecar-target-directory: /tmp/dashboards
data:
  # We are telling Grafana to download the official ID 4686
  sock-shop-id: "4686"
