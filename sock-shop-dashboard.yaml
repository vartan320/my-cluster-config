apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sock-shop-dashboard-provisioner
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/vartan320/my-cluster-config.git' # Your repo
    targetRevision: HEAD
    path: . # Points to the root where your yaml is
    directory:
      include: 'sock-shop-dashboard.yaml'
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring # Must be the same as your Grafana
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
